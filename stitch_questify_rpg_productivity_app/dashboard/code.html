<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - Questify</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Geist:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#6900b3",
                    "on-primary-fixed-variant": "#574500",
                    "outline": "#99907c",
                    "on-surface-variant": "#d0c5af",
                    "on-secondary-container": "#004d44",
                    "error-container": "#93000a",
                    "on-secondary-fixed": "#00201c",
                    "surface-container": "#122131",
                    "surface-container-low": "#0d1c2d",
                    "surface-bright": "#2c3a4c",
                    "primary-container": "#d4af37",
                    "primary": "#f2ca50",
                    "surface-container-high": "#1c2b3c",
                    "on-primary": "#3c2f00",
                    "on-primary-fixed": "#241a00",
                    "primary-fixed": "#ffe088",
                    "on-surface": "#d4e4fa",
                    "background": "#051424",
                    "secondary-container": "#03c6b2",
                    "on-tertiary-fixed": "#2c0051",
                    "tertiary-fixed-dim": "#ddb7ff",
                    "primary-fixed-dim": "#e9c349",
                    "inverse-on-surface": "#233143",
                    "secondary-fixed": "#62fae3",
                    "on-primary-container": "#554300",
                    "tertiary-container": "#d09eff",
                    "on-tertiary-container": "#6700b0",
                    "secondary-fixed-dim": "#3cddc7",
                    "outline-variant": "#4d4635",
                    "surface-dim": "#051424",
                    "surface": "#051424",
                    "on-secondary-fixed-variant": "#005047",
                    "on-error": "#690005",
                    "surface-variant": "#273647",
                    "on-secondary": "#003731",
                    "error": "#ffb4ab",
                    "on-error-container": "#ffdad6",
                    "secondary": "#44e2cd",
                    "on-tertiary": "#490080",
                    "surface-tint": "#e9c349",
                    "surface-container-lowest": "#010f1f",
                    "surface-container-highest": "#273647",
                    "tertiary-fixed": "#f0dbff",
                    "inverse-surface": "#d4e4fa",
                    "on-background": "#d4e4fa",
                    "tertiary": "#e3c2ff",
                    "inverse-primary": "#735c00"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "16px",
                    "stack-sm": "8px",
                    "gutter": "16px",
                    "stack-lg": "32px",
                    "unit": "4px",
                    "container-margin": "24px"
            },
            "fontFamily": {
                    "display-hero": [
                            "Space Grotesk"
                    ],
                    "label-mono": [
                            "JetBrains Mono"
                    ],
                    "headline-lg": [
                            "Space Grotesk"
                    ],
                    "body-md": [
                            "Geist"
                    ],
                    "headline-lg-mobile": [
                            "Space Grotesk"
                    ]
            },
            "fontSize": {
                    "display-hero": [
                            "48px",
                            {
                                    "lineHeight": "1.1",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "label-mono": [
                            "12px",
                            {
                                    "lineHeight": "1.4",
                                    "fontWeight": "500"
                            }
                    ],
                    "headline-lg": [
                            "32px",
                            {
                                    "lineHeight": "1.2",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ],
                    "headline-lg-mobile": [
                            "24px",
                            {
                                    "lineHeight": "1.2",
                                    "fontWeight": "600"
                            }
                    ]
            }
    },
        },
      }
    </script>
<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hex-badge {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer-anim 3s infinite;
        }
        @keyframes shimmer-anim {
            100% { left: 200%; }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex justify-center">
<div class="w-full max-w-[375px] h-screen overflow-y-auto overflow-x-hidden relative pb-24 border-x border-outline-variant/30 flex flex-col relative">
<!-- TopAppBar (Mobile TopAppBar logic) -->
<header class="bg-background dark:bg-background text-primary font-headline-lg-mobile text-headline-lg-mobile docked full-width top-0 border-b border-outline-variant flat no shadows flex justify-between items-center px-container-margin py-4 w-full sticky top-0 z-40">
<div class="font-display-hero text-display-hero text-primary drop-shadow-[0_0_10px_rgba(242,202,80,0.5)]">
                Questify
            </div>
<div class="flex gap-4">
<button class="scale-95 active:scale-90 transition-transform text-on-surface-variant hover:bg-surface-variant transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="scale-95 active:scale-90 transition-transform text-on-surface-variant hover:bg-surface-variant transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">mail</span>
</button>
</div>
</header>
<main class="flex-1 p-gutter space-y-stack-lg">
<!-- Top: Hero stat bar -->
<section class="glass-panel rounded-xl p-4 flex items-center gap-4 relative overflow-hidden">
<!-- Decorative Corner Accents -->
<div class="absolute top-0 left-0 w-2 h-2 border-t-2 border-l-2 border-primary/50 m-2"></div>
<div class="absolute top-0 right-0 w-2 h-2 border-t-2 border-r-2 border-primary/50 m-2"></div>
<div class="absolute bottom-0 left-0 w-2 h-2 border-b-2 border-l-2 border-primary/50 m-2"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b-2 border-r-2 border-primary/50 m-2"></div>
<!-- Hex Badge -->
<div class="hex-badge bg-primary/20 border-2 border-primary w-16 h-16 flex items-center justify-center shrink-0 shadow-[0_0_15px_rgba(242,202,80,0.5)]">
<div class="flex flex-col items-center">
<span class="font-label-mono text-label-mono text-primary/80 uppercase">LV</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">14</span>
</div>
</div>
<div class="flex-1 flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="font-body-md text-body-md text-on-surface-variant">XP</span>
<span class="font-label-mono text-label-mono text-primary">3,450 / 5,000</span>
</div>
<!-- XP Bar -->
<div class="w-full h-3 bg-surface-container-highest rounded-full shadow-inner overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-primary w-[69%] shimmer rounded-full"></div>
</div>
</div>
<div class="shrink-0 flex flex-col items-center justify-center pl-2 border-l border-outline-variant/30">
<span class="material-symbols-outlined text-secondary-container" data-weight="fill" style="font-variation-settings: 'FILL' 1;">diamond</span>
<span class="font-label-mono text-label-mono text-on-surface">2,840</span>
</div>
</section>
<!-- Row 2: Streak & Tokens -->
<section class="grid grid-cols-2 gap-gutter">
<!-- Streak Card -->
<div class="glass-panel rounded-xl p-4 flex flex-col items-center gap-2 hover:shadow-[0_0_15px_rgba(3,198,178,0.3)] transition-shadow border-secondary-container/30">
<span class="material-symbols-outlined text-secondary text-3xl">local_fire_department</span>
<div class="text-center">
<div class="font-headline-lg-mobile text-headline-lg-mobile text-secondary font-bold">14</div>
<div class="font-label-mono text-label-mono text-on-surface-variant uppercase">Day Streak</div>
</div>
</div>
<!-- Freeze Token Card -->
<div class="glass-panel rounded-xl p-4 flex flex-col items-center gap-2 hover:shadow-[0_0_15px_rgba(212,175,55,0.3)] transition-shadow border-primary/30">
<span class="material-symbols-outlined text-primary text-3xl">ac_unit</span>
<div class="text-center">
<div class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">2</div>
<div class="font-label-mono text-label-mono text-on-surface-variant uppercase">Tokens</div>
</div>
</div>
</section>
<!-- Section 3: Today's Quests -->
<section class="glass-panel rounded-xl overflow-hidden">
<div class="p-4 border-b border-outline-variant/30 flex justify-between items-center bg-surface-container-high/50">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile">Today's Quests</h2>
<span class="material-symbols-outlined text-primary text-sm">bolt</span>
</div>
<div class="flex flex-col">
<!-- Task 1 -->
<div class="p-4 border-b border-outline-variant/10 flex items-center gap-3 hover:bg-surface-variant/50 transition-colors cursor-pointer group">
<div class="w-6 h-6 rounded border border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors"></div>
<div class="flex-1 font-body-md text-body-md">Read Documentation</div>
<div class="px-2 py-1 bg-surface-bright/50 rounded text-secondary font-label-mono text-label-mono flex items-center gap-1 border border-secondary/20">
<span>+50</span> <span class="material-symbols-outlined text-[10px]">star</span>
</div>
</div>
<!-- Task 2 -->
<div class="p-4 border-b border-outline-variant/10 flex items-center gap-3 hover:bg-surface-variant/50 transition-colors cursor-pointer group">
<div class="w-6 h-6 rounded border border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors"></div>
<div class="flex-1 font-body-md text-body-md">Algorithm Practice</div>
<div class="px-2 py-1 bg-surface-bright/50 rounded text-tertiary font-label-mono text-label-mono flex items-center gap-1 border border-tertiary/20">
<span>+50</span> <span class="material-symbols-outlined text-[10px]">star</span>
</div>
</div>
<!-- Task 3 -->
<div class="p-4 flex items-center gap-3 hover:bg-surface-variant/50 transition-colors cursor-pointer group">
<div class="w-6 h-6 rounded border border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors"></div>
<div class="flex-1 font-body-md text-body-md">UI Refinement</div>
<div class="px-2 py-1 bg-surface-bright/50 rounded text-secondary font-label-mono text-label-mono flex items-center gap-1 border border-secondary/20">
<span>+50</span> <span class="material-symbols-outlined text-[10px]">star</span>
</div>
</div>
</div>
</section>
<!-- Section 4: Active Quest -->
<section class="glass-panel rounded-xl p-4 border border-tertiary-container/30 relative">
<div class="absolute top-0 right-0 bg-tertiary/20 text-tertiary font-label-mono text-[10px] px-2 py-1 rounded-bl-lg uppercase tracking-wider border-b border-l border-tertiary-container/30">Active</div>
<div class="flex items-start gap-4 mb-4 mt-2">
<div class="p-3 bg-surface-container-high rounded-lg border border-outline-variant">
<span class="material-symbols-outlined text-tertiary text-2xl">menu_book</span>
</div>
<div>
<h3 class="font-body-md text-body-md font-bold text-on-surface">YOLO Mastery</h3>
<p class="font-label-mono text-label-mono text-on-surface-variant mt-1">Epic Quest Series</p>
</div>
</div>
<div class="flex justify-between items-end mb-2">
<span class="font-label-mono text-label-mono text-tertiary">3/5 Completed</span>
<span class="font-label-mono text-label-mono text-on-surface-variant">60%</span>
</div>
<div class="w-full h-2 bg-surface-container-highest rounded-full shadow-inner overflow-hidden">
<div class="h-full bg-gradient-to-r from-tertiary-container to-tertiary w-[60%] shimmer rounded-full"></div>
</div>
</section>
</main>
<!-- FAB -->
<button class="fixed bottom-[96px] right-4 w-14 h-14 bg-primary text-on-primary rounded-full shadow-[0_0_20px_rgba(242,202,80,0.6)] flex items-center justify-center z-40 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</button>
<!-- BottomNavBar (Mobile Shell) -->
<nav class="bg-surface-container/80 dark:bg-surface-container/80 backdrop-blur-xl font-label-mono text-label-mono font-display-hero text-display-hero text-primary docked full-width bottom-0 rounded-t-xl border-t border-outline-variant shadow-lg fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe absolute bottom-0 max-w-[375px]">
<button class="flex flex-col items-center justify-center text-primary drop-shadow-[0_0_8px_rgba(242,202,80,0.6)] border-b-2 border-primary pb-1 scale-110 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">home</span>
<span>Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:text-primary transition-all scale-110 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">swords</span>
<span>Quests</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:text-primary transition-all scale-110 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">workspace_premium</span>
<span>Rewards</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:text-primary transition-all scale-110 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">monitoring</span>
<span>Stats</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:text-primary transition-all scale-110 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">settings</span>
<span>Config</span>
</button>
</nav>
</div>
</body></html>
